# Ruff 配置文件
# 文档: https://docs.astral.sh/ruff/

target-version = "py313"

line-length = 120

# .claude/skills/ 和 .agents/skills/ 为智能体技能脚本，不属于 MwjRunner 项目代码，整体排除检查。
exclude = [".claude/skills/", ".agents/skills/"]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "RET",    # flake8-return
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # pylint
    "RUF",    # ruff-specific rules
]

ignore = [
    "PLR0913",  # Too many arguments
    "PLR2004",  # Magic value used in comparison
    # RUF001/RUF002/RUF003: 仓库使用中文注释和文档字符串，中文标点（如全角逗号、顿号）
    # 会触发"ambiguous unicode character"误报，与中文写作习惯冲突，全局豁免。
    "RUF001",
    "RUF002",
    "RUF003",
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "ARG001",   # Unused function argument (fixtures)
    "PLR2004",  # Magic value in comparison (test assertions)
]
# platform/backend/ 使用 FastAPI 传统 Depends(...) 默认参数写法（B008），
# 迁移到 Annotated[..., Depends(...)] 属于大规模重构，不在当前收敛范围内。
"platform/backend/app/api/*.py" = ["B008"]
"platform/backend/app/core/permissions.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
