[pytest]
# pytest 配置文件
# 注意：pytest 仅用于 MwjRunner 项目自身的开发测试，不作为 MwjRunner 的核心执行框架

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试（需要启动 FastAPI 示例服务）

# 引擎数据模型 TestCase/TestStep 并非测试类，忽略 pytest 的误收集警告
filterwarnings =
    ignore::pytest.PytestCollectionWarning
